name = "dadar-shop-api"
main = "src/index.ts"
compatibility_date = "2026-06-21"
compatibility_flags = ["nodejs_compat"]

# ───────────────────────────────────────────────────────────────────────────
# Secrets (set with `wrangler secret put <NAME>`, NEVER committed here):
#
#   JWT_SECRET            — required. >=32 random chars. `openssl rand -hex 32`
#   ADMIN_EMAIL            — the one account treated as Admin. Server-side
#                            only; the client can never set/influence this.
#                            (Alias: SUPER_ADMIN_EMAIL — either name works,
#                            ADMIN_EMAIL takes precedence if both are set.)
#   ADMIN_SECRET_KEY       — required to complete admin registration/login.
#                            >=16 chars, compared in constant time.
#                            (Alias: SUPER_ADMIN_SECRET_KEY.)
#   BREVO_API_KEY          — Brevo (Sendinblue) transactional email API key.
#                            Omitted in local dev — OTPs are logged to the
#                            console instead of emailed.
#   SENDER_EMAIL           — "Name <email>" the OTP emails are sent from.
#                            (Alias: BREVO_FROM_EMAIL.)
#   INTERNAL_BROADCAST_SECRET — only needed if ADMIN_HUB (Durable Objects)
#                            is bound below.
#
# Set SUPER_ADMIN_ENABLED = "true" in [vars] below ONLY long enough to run
# the one-time admin bootstrap (POST /api/auth/register with
# email === ADMIN_EMAIL + the correct ADMIN_SECRET_KEY), then set it back
# to "false". Leaving it "true" in production is flagged at startup.
# ───────────────────────────────────────────────────────────────────────────

# ───── D1 (SQLite) — available on free plan ─────
[[d1_databases]]
binding = "DB"
database_name = "dadar_shop"
database_id = "0710a836-6be0-49ed-af88-3d2dd27defd6"
migrations_dir = "migrations"

# ───── KV — sessions + revocation tombstones + rate limits ─────
[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "b8995e2f261b485793ed00d5d54bc2d3"

[[kv_namespaces]]
binding = "RATE_KV"
id = "3102f3bc44764311882fc90d932e94f5"

# ───── R2 — image uploads (NOT free plan) ─────
# [[r2_buckets]]
# binding = "UPLOADS"
# bucket_name = "dadar-uploads"

# ───── Durable Objects — AdminHub (NOT free plan) ─────
# [[durable_objects.bindings]]
# name = "ADMIN_HUB"
# class_name = "AdminHub"
#
# [[migrations]]
# tag = "v1"
# new_classes = ["AdminHub"]

# ───── Cron — health check every minute ─────
[triggers]
crons = ["* * * * *"]

# ───── Plain env vars ─────
[vars]
APP_URL = "https://dadar-shop-api.shop-io.workers.dev"
CORS_ORIGIN = "https://dadar.shop-io.workers.dev"
SUPER_ADMIN_ENABLED = "false"
BREVO_FROM_EMAIL = "Dadar Shop <dadarshop.otp@gmail.com>"
IMAGE_CDN_BASE = ""
NODE_ENV = "production"

# Local-dev overrides
[env.dev.vars]
CORS_ORIGIN = "http://localhost:5173"
APP_URL = "http://localhost:8787"
NODE_ENV = "development"
